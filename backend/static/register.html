<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Register</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    body { font-family: system-ui, sans-serif; background:#0f172a; color:#e2e8f0; display:flex; align-items:center; justify-content:center; min-height:100vh; padding:20px; }
    .card { background:#111827; padding:20px; border-radius:12px; width:100%; max-width:400px; }
    input, button { width:100%; padding:8px; margin:6px 0; border-radius:8px; border:1px solid #334155; background:#0b1220; color:#e2e8f0; font-size:14px; box-sizing:border-box; }
    button { background:linear-gradient(90deg,#22d3ee,#a78bfa); border:none; color:#001018; font-weight:600; cursor:pointer; }
    button.secondary { background:#334155; color:#e2e8f0; }
    .meta { font-size:12px; color:#94a3b8; margin-top:6px; }
    .error { color:#f87171; }
    label { display:block; margin-top:12px; font-size:14px; color:#cbd5e1; }
  </style>
</head>
<body>
  <div class="card">
    <h2>Create Account</h2>
    <form id="registerForm">
      <label>Username</label>
      <input id="username" placeholder="Choose a username" required autofocus />

      <label>Email</label>
      <input id="email" type="email" placeholder="you@example.com" required />

      <label>Password</label>
      <input id="password" type="password" placeholder="••••••••" required />

      <label>Confirm Password</label>
      <input id="confirmPassword" type="password" placeholder="••••••••" required />

      <button type="submit">Create Account</button>
      <button type="button" class="secondary" id="backToLogin">Back to Login</button>
    </form>

    <div class="meta" id="authMsg"></div>
  </div>

<script>
async function postJSON(url, body) {
  const r = await fetch(url, {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify(body)
  });
  const text = await r.text();
  let data;
  try { data = JSON.parse(text); } catch { throw new Error(text); }
  if (!r.ok) throw new Error(data.msg || `HTTP ${r.status}`);
  return data;
}

const $ = id => document.getElementById(id);
const BACKEND_DEFAULT = window.location.origin;

function saveToken(t){ if(t) localStorage.setItem('access_token',t); else localStorage.removeItem('access_token'); }
function setAuthMsg(t, isError=false){
  const el = $('authMsg');
  el.textContent = t || '';
  el.className = isError ? 'meta error' : 'meta';
}

$('backToLogin').onclick = () => {
  window.location.href = 'login.html';
};

$('registerForm').onsubmit = async (e) => {
  e.preventDefault();
  const username = $('username').value.trim();
  const email = $('email').value.trim();
  const password = $('password').value;
  const confirmPassword = $('confirmPassword').value;

  if(!username || !email || !password || !confirmPassword) {
    return setAuthMsg('All fields are required.', true);
  }

  if(password !== confirmPassword) {
    return setAuthMsg('Passwords do not match.', true);
  }

  if(password.length < 6) {
    return setAuthMsg('Password must be at least 6 characters.', true);
  }

  try {
    const response = await postJSON(`${BACKEND_DEFAULT}/api/auth/register`, {
      name: username,
      email: email,
      password: password
    });

    console.log('Registration response:', response);

    // Automatically log in after successful registration
    const token = response.access_token || response.token;
    console.log('Token from registration:', token ? token.substring(0, 20) + '...' : 'null');

    if(token) {
      saveToken(token);
      console.log('Token saved to localStorage');
      console.log('Verification - token in localStorage:', localStorage.getItem('access_token') ? 'present' : 'missing');
      setAuthMsg('Account created! Redirecting to chat...');
      setTimeout(() => {
        window.location.href = 'chat.html';
      }, 1000);
    } else {
      console.warn('No token received from registration!');
      setAuthMsg('Account created! Redirecting to login...');
      setTimeout(() => {
        window.location.href = 'login.html';
      }, 1000);
    }
  } catch(e) {
    console.error('Registration error:', e);
    setAuthMsg('Registration error: ' + e.message, true);
  }
};
</script>
</body>
</html>
