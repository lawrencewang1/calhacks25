<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Login</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    body { font-family: system-ui, sans-serif; background:#0f172a; color:#e2e8f0; display:flex; align-items:center; justify-content:center; height:100vh; }
    .card { background:#111827; padding:20px; border-radius:12px; width:300px; }
    input, button { width:100%; padding:8px; margin:6px 0; border-radius:8px; border:1px solid #334155; background:#0b1220; color:#e2e8f0; font-size:14px; }
    button.primary { background:linear-gradient(90deg,#22d3ee,#a78bfa); border:none; color:#001018; font-weight:600; cursor:pointer; }
    .meta { font-size:12px; color:#94a3b8; margin-top:6px; text-align:center; }
    .link { color:#22d3ee; text-decoration:none; cursor:pointer; }
    .link:hover { text-decoration:underline; }
  </style>
</head>
<body>
  <div class="card">
    <h2>Login</h2>
    <label>Email</label>
    <input id="email" type="email" placeholder="you@example.com" autofocus />
    <label>Password</label>
    <input id="password" type="password" placeholder="••••••••" />
    <button id="login" class="primary">Login</button>

    <div class="meta" id="authMsg"></div>
    <div class="meta">
      Don't have an account? <a href="register.html" class="link">Create one</a>
    </div>
  </div>

<script>
async function postJSON(url, body) {
  const r = await fetch(url, {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify(body)
  });
  const text = await r.text();
  let data;
  try { data = JSON.parse(text); } catch { throw new Error(text); }
  if (!r.ok) throw new Error(data.msg || `HTTP ${r.status}`);
  return data;
}

const $ = id => document.getElementById(id);
const BACKEND_DEFAULT = window.location.origin;

function saveToken(t){ if(t) localStorage.setItem('access_token',t); else localStorage.removeItem('access_token'); }
function setAuthMsg(t){ $('authMsg').textContent = t || ''; }

async function doLogin() {
  const email=$('email').value.trim(), password=$('password').value;
  if(!email||!password)return setAuthMsg('Email & password required.');
  try {
    const j = await postJSON(`${BACKEND_DEFAULT}/api/auth/login`,{email,password});
    const token = j.access_token || j.token;
    if(!token)throw new Error('No access_token');
    saveToken(token);
    setAuthMsg('Logged in. Redirecting...');
    // redirect to chat page
    window.location.href = 'chat.html';
  } catch(e){ setAuthMsg('Login error: '+e.message); }
}

$('login').onclick = doLogin;
$('password').addEventListener('keydown', (e) => {
  if(e.key === 'Enter') {
    e.preventDefault();
    doLogin();
  }
});
</script>
</body>
</html>
